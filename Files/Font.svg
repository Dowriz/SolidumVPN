<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 100" width="800" height="100" preserveAspectRatio="xMidYMid meet" style="max-width:100%;height:auto;overflow:visible">
	<foreignObject x="0" y="0" width="800" height="100">
		<div xmlns="http://www.w3.org/1999/xhtml" class="container">
			<style>
				html, body { 
					margin: 0; 
					padding: 0; 
					-webkit-text-size-adjust: 100%; 
					text-size-adjust: 100%; 
					background: transparent;
				}
				
				@keyframes gradientText {
					0% { background-position: 0% 50%; }
					50% { background-position: 100% 50%; }
					100% { background-position: 0% 50%; }
				}
				
				.container {
					width: 100%;
					height: 100%;
					display: flex;
					flex-direction: column;
					justify-content: center;
					align-items: center;
					-webkit-text-size-adjust: 100%; 
					text-size-adjust: 100%;
				}
				
				h1 {
					white-space: nowrap;
					-webkit-text-size-adjust: 100%;
					text-size-adjust: 100%;
					font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
					margin: 0;
					font-size: 3.2em;
					font-weight: 900;
					letter-spacing: -.05em;
					text-align: center;
					line-height: 1.05;
					background: linear-gradient(270deg, #ffffff 0%, #a8d8ff 50%, #ffffff 100%);
					background-size: 200% auto;
					background-clip: text;
					-webkit-background-clip: text;
					-webkit-text-fill-color: transparent;
					animation: gradientText 4s ease infinite;
					text-shadow: 0 0 15px rgba(168, 216, 255, 0.5);
				}
			</style>
			<h1>DARK VPN FROM DOWRIZ</h1>
		</div>
	</foreignObject>
</svg>
