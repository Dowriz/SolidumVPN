<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="SolidumVPN - Лучший и безопасный выбор для защиты ваших данных, анонимности и свободного доступа в интернет. Высокая скорость, надежное шифрование, поддержка 24/7.">
    <title>SolidumVPN</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='30' fill='%2300eebe' stroke='%2340ffd0' stroke-width='3' /%3E%3Cellipse cx='50' cy='50' rx='45' ry='12' fill='none' stroke='%2340ffd0' stroke-width='3' /%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Montserrat', sans-serif;
            background: #041a18;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 10%, #008f7a, #021210);
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 40% 50%, rgba(0, 238, 190, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 210, 170, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 10% 85%, rgba(64, 255, 208, 0.3) 0%, transparent 60%);
            animation: auroraShift 10s infinite alternate ease-in-out;
            filter: blur(50px);
        }

        @keyframes auroraShift {
            0% {
                opacity: 0.7;
                transform: scale(1) translate(0%, 0%);
            }
            100% {
                opacity: 1;
                transform: scale(1.05) translate(1%, -1%);
            }
        }

        .content {
            position: relative;
            z-index: 15;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem 2rem;
            text-align: center;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            margin-bottom: 3rem;
        }

        .glow-title {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            color: #ffffff;
        }

        .glow-title-second {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            color: #ffffff;
        }

        .telegram-bar {
            background: rgba(0, 70, 65, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.9rem 2rem;
            margin: 0 auto 1rem auto;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(0, 238, 190, 0.85);
            text-decoration: none;
            color: white;
        }

        .telegram-bar i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #a0ffe8, #00eebe);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .telegram-bar span {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .telegram-bar .link {
            font-weight: 700;
            color: #80ffe0;
            text-decoration: none;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        .card {
            background: rgba(0, 70, 65, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.8rem 1.5rem;
            text-align: center;
            border: 1px solid rgba(0, 238, 190, 0.75);
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.4);
        }

        .card i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: linear-gradient(135deg, #a0ffe8, #00eebe);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            letter-spacing: -0.3px;
        }

        .card p {
            font-size: 0.85rem;
            opacity: 0.75;
            line-height: 1.4;
        }

        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        html {
            scroll-behavior: smooth;
        }
        
        body {
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                margin-top: 0.5rem;
            }
            .content {
                padding: 1.5rem 1rem 4rem 1rem;
            }
            .card {
                padding: 1.2rem 1rem;
            }
            .card h3 {
                font-size: 1.2rem;
            }
            .card i {
                font-size: 2rem;
            }
            .card p {
                font-size: 0.75rem;
            }
            .telegram-bar {
                padding: 0.7rem 1.5rem;
                gap: 0.7rem;
                margin-bottom: 0.8rem;
            }
            .telegram-bar i {
                font-size: 1.4rem;
            }
            .telegram-bar span {
                font-size: 0.9rem;
            }
            .title-group {
                gap: 0.2rem;
                margin-bottom: 2rem;
            }
        }

        @media (max-width: 480px) {
            .cards-container {
                gap: 0.8rem;
            }
            .card {
                padding: 1rem 0.8rem;
            }
            .card h3 {
                font-size: 1rem;
            }
            .card i {
                font-size: 1.8rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="animated-bg"></div>
<div class="aurora"></div>
<canvas id="snowCanvas"></canvas>

<div class="content">
    <div class="title-group">
        <div class="glow-title">SOLIDUM</div>
        <div class="glow-title-second">VPN</div>
    </div>

    <a href="https://t.me/SolidumVPN" target="_blank" rel="noopener noreferrer" class="telegram-bar">
        <i class="fab fa-telegram-plane"></i>
        <span class="link">@SolidumVPN</span>
    </a>

    <div class="cards-container">
        <div class="card">
            <i class="fas fa-headset"></i>
            <h3>24/7 Поддержка</h3>
            <p>Операторы всегда на связи, поможем в любой ситуации</p>
        </div>
        <div class="card">
            <i class="fas fa-shield-alt"></i>
            <h3>Надёжность</h3>
            <p>99.9% аптайма и защита от утечек</p>
        </div>
        <div class="card">
            <i class="fas fa-rocket"></i>
            <h3>Скорость</h3>
            <p>Высокоскоростные серверы по всему миру</p>
        </div>
        <div class="card">
            <i class="fas fa-user-secret"></i>
            <h3>Анонимность</h3>
            <p>Никаких логов, полная конфиденциальность</p>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('snowCanvas');
        let ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        let snowflakes = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Snow {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.0 + 0.5;
                this.speedY = Math.random() * 0.7 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.4 + 0.15;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > height + 10) {
                    this.y = -10;
                    this.x = Math.random() * width;
                }
                if (this.x > width + 15) this.x = -15;
                if (this.x < -15) this.x = width + 15;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 250, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initSnow(count) {
            snowflakes = [];
            for (let i = 0; i < count; i++) {
                snowflakes.push(new Snow());
            }
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            for (let flake of snowflakes) {
                flake.update();
                flake.draw();
            }
            requestAnimationFrame(animateSnow);
        }

        function handleResize() {
            resizeCanvas();
            let newCount = Math.floor((width * height) / 2500);
            newCount = Math.min(500, Math.max(200, newCount));
            initSnow(newCount);
        }

        resizeCanvas();
        let snowCount = Math.floor((width * height) / 2500);
        snowCount = Math.min(500, Math.max(200, snowCount));
        initSnow(snowCount);
        animateSnow();

        window.addEventListener('resize', () => {
            handleResize();
        });
    })();
</script>

</body>
</html>
